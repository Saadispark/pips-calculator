<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AssetRanks · Pips Calculator</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00e5a0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PipsCalc">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0a0c0f;
    --panel: #0f1318;
    --border: #1e2530;
    --accent: #00e5a0;
    --accent2: #ff4d6d;
    --accent3: #f0b429;
    --text: #d4dbe8;
    --muted: #4a5568;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 24px) 16px env(safe-area-inset-bottom, 24px);
    padding-top: max(env(safe-area-inset-top), 24px);
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,160,0.07) 0%, transparent 60%),
      linear-gradient(180deg, #0a0c0f 0%, #080b10 100%);
  }

  /* AssetRanks Branding */
  .brand-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 18px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, #00e5a0 0%, #00b377 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
    color: #000;
    font-family: var(--sans);
    letter-spacing: -0.02em;
    box-shadow: 0 0 18px rgba(0,229,160,0.3);
    flex-shrink: 0;
  }

  .brand-name {
    font-family: var(--sans);
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    color: #fff;
    text-transform: uppercase;
  }

  .brand-name span {
    color: var(--accent);
  }

  .brand-tagline {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .brand-divider {
    width: 100%;
    max-width: 340px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,160,0.3), transparent);
    margin: 10px auto 0;
  }

  .tool-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    margin-bottom: 4px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    text-align: center;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  input, select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 10px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
    width: 160px;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.1);
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
    max-width: 900px;
    margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.82rem;
  }

  thead tr {
    background: #0d1117;
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 14px;
    text-align: right;
    color: var(--muted);
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  th:first-child { text-align: left; }

  tbody tr {
    border-bottom: 1px solid rgba(30,37,48,0.6);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 11px 14px;
    text-align: right;
    white-space: nowrap;
  }

  td:first-child {
    text-align: left;
    color: var(--accent3);
    font-weight: 600;
    font-size: 0.9rem;
  }

  .lot-label { color: #fff; font-size: 0.78rem; }
  .pos { color: var(--accent); }
  .neg { color: var(--accent2); }
  .neutral { color: var(--muted); }
  .highlight-row td:first-child { color: var(--accent); }

  .dir-toggle {
    display: flex;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    width: 160px;
  }

  .dir-btn {
    flex: 1;
    padding: 10px 8px;
    background: var(--panel);
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .dir-btn.active-buy  { background: rgba(0,229,160,0.15); color: var(--accent); }
  .dir-btn.active-sell { background: rgba(255,77,109,0.15); color: var(--accent2); }

  .badge {
    display: inline-block;
    font-size: 0.58rem;
    padding: 2px 5px;
    border-radius: 3px;
    margin-left: 5px;
    vertical-align: middle;
    font-family: var(--mono);
  }

  .badge-green { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
  .badge-red   { background: rgba(255,77,109,0.12); color: var(--accent2); border: 1px solid rgba(255,77,109,0.2); }

  .pip-val-note {
    text-align: center;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 14px;
    padding: 0 12px;
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  .pip-val-note span { color: var(--accent3); }

  /* Install banner */
  #installBanner {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    gap: 10px;
  }

  #installBanner p {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  #installBtn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  #dismissBtn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 0 4px;
    -webkit-tap-highlight-color: transparent;
  }

  @media (max-width: 480px) {
    input, select, .dir-toggle { width: 140px; }
    td, th { padding: 9px 9px; font-size: 0.75rem; }
    td:first-child { font-size: 0.82rem; }
  }
</style>
</head>
<body>

<!-- AssetRanks Brand Header -->
<div class="brand-header">
  <div class="brand-logo">
    <div class="brand-icon">AR</div>
    <div class="brand-name">Asset<span>Ranks</span></div>
  </div>
  <p class="brand-tagline">Trade Smart · Rank Higher</p>
  <div class="brand-divider"></div>
</div>

<p class="tool-label">▸ Pips Calculator</p>
<h1>PIPS <span>CALCULATOR</span></h1>
<p class="subtitle">Forex &amp; Gold · Profit / Loss</p>

<!-- Install Banner -->
<div id="installBanner">
  <p>📲 Install as app on your phone</p>
  <button id="installBtn">Install</button>
  <button id="dismissBtn">✕</button>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Pips Moved</label>
    <input type="number" id="pips" value="200" min="1" max="10000" step="1" inputmode="numeric">
  </div>
  <div class="ctrl-group">
    <label>Pair Type</label>
    <select id="pairType">
      <option value="forex">EUR/USD, GBP/USD</option>
      <option value="usd_base">USD/CAD, USD/CHF</option>
      <option value="jpy">USD/JPY (~145)</option>
      <option value="xauusd">⭐ XAUUSD — Gold</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Direction</label>
    <div class="dir-toggle">
      <button class="dir-btn active-buy" id="btnBuy" onclick="setDir('buy')">▲ BUY</button>
      <button class="dir-btn" id="btnSell" onclick="setDir('sell')">▼ SELL</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Lot</th>
        <th>Units</th>
        <th>$/pip</th>
        <th>50p</th>
        <th>100p</th>
        <th>200p</th>
        <th>500p</th>
        <th>Custom</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<p class="pip-val-note" id="pipNote"></p>

<div style="text-align:center; margin-top: 28px; padding-top: 16px; border-top: 1px solid #1e2530;">
  <span style="font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:#2a3545; letter-spacing:0.15em; text-transform:uppercase;">
    © 2026 AssetRanks · All rights reserved
  </span>
</div>

<script>
  let direction = 'buy';
  let deferredPrompt = null;

  // PWA install prompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });

  document.getElementById('dismissBtn').addEventListener('click', () => {
    document.getElementById('installBanner').style.display = 'none';
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  // --- Calculator Logic ---
  const forexLots = [
    { label: '0.01', units: '1,000',     name: 'Micro' },
    { label: '0.05', units: '5,000',     name: '' },
    { label: '0.10', units: '10,000',    name: 'Mini' },
    { label: '0.25', units: '25,000',    name: '' },
    { label: '0.50', units: '50,000',    name: '' },
    { label: '1.00', units: '100,000',   name: 'Standard' },
    { label: '2.00', units: '200,000',   name: '' },
    { label: '5.00', units: '500,000',   name: '' },
    { label: '10.0', units: '1,000,000', name: '' },
  ];

  const xauLots = [
    { label: '0.01', units: '1 oz',   name: 'Micro' },
    { label: '0.05', units: '5 oz',   name: '' },
    { label: '0.10', units: '10 oz',  name: 'Mini' },
    { label: '0.25', units: '25 oz',  name: '' },
    { label: '0.50', units: '50 oz',  name: '' },
    { label: '1.00', units: '100 oz', name: 'Standard' },
    { label: '2.00', units: '200 oz', name: '' },
    { label: '5.00', units: '500 oz', name: '' },
  ];

  const pipColumns = [50, 100, 200, 500];

  function pipValuePerLot(t) {
    if (t === 'jpy')      return 1000 / 145;
    if (t === 'usd_base') return 10;
    if (t === 'xauusd')   return 1;
    return 10;
  }

  function getLots(t) { return t === 'xauusd' ? xauLots : forexLots; }

  function setDir(d) {
    direction = d;
    document.getElementById('btnBuy').className  = 'dir-btn' + (d === 'buy'  ? ' active-buy'  : '');
    document.getElementById('btnSell').className = 'dir-btn' + (d === 'sell' ? ' active-sell' : '');
    render();
  }

  function fmt(val) {
    const abs = Math.abs(val);
    const s = abs < 0.01 ? abs.toFixed(4) : abs < 1 ? abs.toFixed(3) : abs.toFixed(2);
    return (val < 0 ? '-' : '+') + '$' + parseFloat(s).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function cc(v) { return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neutral'; }

  function render() {
    const pips     = parseFloat(document.getElementById('pips').value) || 200;
    const pairType = document.getElementById('pairType').value;
    const sign     = direction === 'buy' ? 1 : -1;
    const pv       = pipValuePerLot(pairType);
    const lots     = getLots(pairType);
    const isBuy    = direction === 'buy';

    const notes = {
      forex:    'EUR/USD, GBP/USD: <span>$10 / pip / standard lot</span>',
      usd_base: 'USD/CAD, USD/CHF: <span>~$10 / pip / standard lot</span>',
      jpy:      'USD/JPY ~145: <span>~$6.90 / pip / standard lot</span>',
      xauusd:   '⭐ Gold — 1 pip = $0.01 move · <span>$1 / pip / standard lot (100 oz)</span>',
    };
    document.getElementById('pipNote').innerHTML = notes[pairType];

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    lots.forEach(lot => {
      const pipVal = pv * parseFloat(lot.label);
      const tr = document.createElement('tr');
      if (lot.name === 'Standard') tr.className = 'highlight-row';

      let html = `<td>
        <span class="lot-label">${lot.label}</span>
        ${lot.name ? `<span class="badge ${isBuy?'badge-green':'badge-red'}">${lot.name}</span>` : ''}
      </td>`;
      html += `<td>${lot.units}</td>`;
      html += `<td class="${isBuy?'pos':'neg'}">$${pipVal.toFixed(2)}</td>`;

      pipColumns.forEach(p => {
        const profit = sign * pipVal * p;
        html += `<td class="${cc(profit)}">${fmt(profit)}</td>`;
      });

      const custom = sign * pipVal * pips;
      html += `<td class="${cc(custom)}" style="font-weight:700">${fmt(custom)}</td>`;

      tr.innerHTML = html;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('pips').addEventListener('input', render);
  document.getElementById('pairType').addEventListener('change', render);
  render();
</script>

</body>
</html>
